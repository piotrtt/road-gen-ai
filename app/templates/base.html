<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}Road-Gen-AI Results{% endblock %}</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
           margin: 0; background: #fafafa; color: #222; }
    header { background: #1f4e79; color: white; padding: 14px 28px; display: flex;
             align-items: baseline; justify-content: space-between; }
    header a { color: #cfe2ff; text-decoration: none; margin-left: 18px; font-size: 14px; }
    header a:hover { text-decoration: underline; }
    main { padding: 28px; max-width: 1200px; margin: 0 auto; }
    h1 { margin: 0; font-size: 18px; font-weight: 600; }
    h2 { margin-top: 32px; }
    table { border-collapse: collapse; width: 100%; background: white; }
    th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
    th { background: #f0f4f8; font-weight: 600; cursor: pointer; user-select: none; }
    th.numeric, td.numeric { text-align: right; font-variant-numeric: tabular-nums; }
    tr.llm td:first-child { color: #c0392b; font-weight: 600; }
    tr:hover { background: #fff8e1; }
    .small { color: #888; font-size: 12px; }
    .plot { margin: 24px 0; background: white; padding: 12px; border: 1px solid #eee; }
    .plot img { max-width: 100%; height: auto; }
    .badge { display: inline-block; background: #e7f1fb; color: #1f4e79; padding: 2px 8px;
             border-radius: 999px; font-size: 12px; }
    .pill-llm { background: #fdebea; color: #c0392b; }
    code { background: #f0f0f0; padding: 1px 5px; border-radius: 3px; font-size: 13px; }
    pre  { background: #f0f0f0; padding: 12px; border-radius: 6px; font-size: 12px;
           overflow-x: auto; }
    .empty { padding: 60px; color: #888; text-align: center; }
  </style>
</head>
<body>
  <header>
    <h1>Road-Gen-AI &mdash; Results Viewer</h1>
    <nav>
      <a href="{{ url_for('index') }}">Runs</a>
      <a href="{{ url_for('temperature') }}">Temperature sweep</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
